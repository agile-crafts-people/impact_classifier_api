        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags:
        - Sentiment
      summary: Update Sentiment document
      description: Update a Sentiment document (requires admin role). Cannot update _id, created, or saved fields.
      operationId: updateSentiment
      security:
        - bearerAuth: []
